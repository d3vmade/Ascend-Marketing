<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ascend Marketing — Video Marketing for the Trades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neon: '#C8FF00',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            neon: '0 0 20px #C8FF0055',
            'neon-lg': '0 0 40px #C8FF0077',
          },
        },
      },
    };
  </script>
  <style>
    html { scroll-behavior: smooth; }
    body { background: #000; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow-x: hidden; }

    .glow-btn {
      box-shadow: 0 0 20px #C8FF0055;
      transition: all 0.25s ease;
    }
    .glow-btn:hover {
      box-shadow: 0 0 40px #C8FF0099;
      transform: translateY(-2px) scale(1.02);
    }
    .ghost-btn {
      transition: all 0.25s ease;
    }
    .ghost-btn:hover {
      box-shadow: 0 0 20px #C8FF0033;
      transform: translateY(-2px) scale(1.02);
    }
    .card-hover {
      transition: all 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 0 30px #C8FF0022;
      border-color: #C8FF0066 !important;
    }

    .step-line::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 100%;
      transform: translateX(-50%);
      width: 2px;
      height: 60px;
      background: linear-gradient(to bottom, #C8FF00, transparent);
    }

    .fade-in {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.4); }
    }
    .pulse-dot { animation: pulse-dot 2s infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .float { animation: float 4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── INLINE SVG ICONS ── */
    const Icon = ({ d, size = 24, strokeWidth = 2, className = '', fill = 'none' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
        strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
        {Array.isArray(d) ? d.map((path, i) => <path key={i} d={path} />) : <path d={d} />}
      </svg>
    );

    const Icons = {
      EyeOff: (p) => <Icon {...p} d={["M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24","M1 1l22 22"]} />,
      TrendingDown: (p) => <Icon {...p} d={["M23 18l-9.5-9.5-5 5L1 6","M17 18h6v-6"]} />,
      Users: (p) => <Icon {...p} d={["M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2","M23 21v-2a4 4 0 0 0-3-3.87","M16 3.13a4 4 0 0 1 0 7.75"]} fill="none" />,
      Video: (p) => <Icon {...p} d="M23 7l-7 5 7 5V7z M1 5h15a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H1a2 2 0 0 1-2-2V7" />,
      Megaphone: (p) => <Icon {...p} d={["M3 11l19-9-9 19-2-8-8-2z"]} />,
      Globe: (p) => <Icon {...p} d={["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z","M2 12h20","M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"]} />,
      Phone: (p) => <Icon {...p} d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.59 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />,
      Calendar: (p) => <Icon {...p} d={["M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z","M16 2v4","M8 2v4","M3 10h18"]} />,
      CheckCircle: (p) => <Icon {...p} d={["M22 11.08V12a10 10 0 1 1-5.93-9.14","M22 4 12 14.01l-3-3"]} />,
      ArrowRight: (p) => <Icon {...p} d={["M5 12h14","M12 5l7 7-7 7"]} />,
      Star: (p) => <Icon {...p} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="currentColor" stroke="none" />,
      Hammer: (p) => <Icon {...p} d={["M15 12l-8.5 8.5c-.83.83-2.17.83-3 0 0 0 0 0 0 0a2.12 2.12 0 0 1 0-3L12 9","M17.64 15 22 10.64","M20.35 12.35 22 10.7a1 1 0 0 0 0-1.41l-4.24-4.24a1 1 0 0 0-1.41 0l-1.65 1.65"]} />,
      Wrench: (p) => <Icon {...p} d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />,
      Thermometer: (p) => <Icon {...p} d={["M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"]} />,
      Zap: (p) => <Icon {...p} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
      Car: (p) => <Icon {...p} d={["M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5","M14 17h-4","M9 17a2 2 0 1 0-4 0 2 2 0 0 0 4 0z","M20 17a2 2 0 1 0-4 0 2 2 0 0 0 4 0z"]} />,
      Home: (p) => <Icon {...p} d={["M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z","M9 22V12h6v10"]} />,
      Paintbrush: (p) => <Icon {...p} d={["M18.37 2.63 14 7l-1.59-1.59-2.83 2.83 1.59 1.59L7 14l-1 5 5-1 4.17-4.17 1.59 1.59 2.83-2.83L18 11l4.37-4.37z","M3 21l3.07-3.07"]} />,
      Leaf: (p) => <Icon {...p} d="M17 8C8 10 5.9 16.17 3.82 19.5c7.17-1.5 11.1-5.67 13.18-9 .8-1.33 1.33-2.67 1.67-4C14.67 3.33 10 2 10 2s2 2 2 4 5 2 5 2z" />,
      Quote: (p) => <Icon {...p} d={["M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z","M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"]} />,
      Menu: (p) => <Icon {...p} d={["M3 12h18","M3 6h18","M3 18h18"]} />,
      X: (p) => <Icon {...p} d={["M18 6L6 18","M6 6l12 12"]} />,
    };

    /* ── ASCEND LOGO — icon img + white HTML text ── */
    const AscendLogo = ({ iconSize = 44, ascendSize = 20, marketingSize = 13, stacked = false }) => (
      stacked ? (
        /* Stacked: icon centred, text centred below */
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
          <img
            src="ascend-logo.png"
            alt="Ascend Marketing logo"
            style={{ width: iconSize, height: 'auto', display: 'block' }}
          />
          <div style={{ textAlign: 'center' }}>
            <div style={{ color: '#FFFFFF', fontWeight: 900, fontSize: ascendSize, lineHeight: 1.1, fontFamily: 'Inter, sans-serif' }}>Ascend</div>
            <div style={{ color: '#C8FF00', fontWeight: 700, fontSize: marketingSize, letterSpacing: 3, fontFamily: 'Inter, sans-serif', marginTop: 4 }}>Marketing</div>
          </div>
        </div>
      ) : (
        /* Horizontal: icon left, text right */
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <img
            src="ascend-logo.png"
            alt="Ascend Marketing logo"
            style={{ width: iconSize, height: 'auto', display: 'block' }}
          />
          <div>
            <div style={{ color: '#FFFFFF', fontWeight: 900, fontSize: ascendSize, lineHeight: 1.1, fontFamily: 'Inter, sans-serif' }}>Ascend</div>
            <div style={{ color: '#C8FF00', fontWeight: 700, fontSize: marketingSize, letterSpacing: 2, fontFamily: 'Inter, sans-serif' }}>Marketing</div>
          </div>
        </div>
      )
    );

    /* ── NAV ── */
    const Nav = () => {
      const [menuOpen, setMenuOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const onScroll = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', onScroll);
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
          background: scrolled ? 'rgba(0,0,0,0.95)' : '#000',
          borderBottom: '1px solid #C8FF0033',
          backdropFilter: 'blur(12px)',
          transition: 'all 0.3s ease',
          boxShadow: scrolled ? '0 4px 30px rgba(0,0,0,0.8)' : 'none',
        }}>
          <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 6%', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 72 }}>
            <AscendLogo iconSize={44} ascendSize={20} marketingSize={12} />
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <a
                href="https://calendly.com/ascendmarketingsupport/30min"
                target="_blank"
                rel="noopener noreferrer"
                onClick={(e) => { e.preventDefault(); window.open('https://calendly.com/ascendmarketingsupport/30min', '_blank'); }}
                className="glow-btn"
                style={{
                  background: '#C8FF00', color: '#000', fontWeight: 800,
                  padding: '10px 22px', borderRadius: 8, textDecoration: 'none',
                  fontSize: 14, letterSpacing: '0.02em',
                }}
              >
                Book a Free Call
              </a>
              <button
                onClick={() => setMenuOpen(!menuOpen)}
                style={{ background: 'none', border: 'none', color: '#fff', cursor: 'pointer', display: 'none' }}
                className="mobile-menu-btn"
                aria-label="Menu"
              >
                {menuOpen ? <Icons.X size={24} /> : <Icons.Menu size={24} />}
              </button>
            </div>
          </div>
        </nav>
      );
    };

    /* ── HERO ── */
    const Hero = () => (
      <section id="hero" style={{
        minHeight: '100vh',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        textAlign: 'center',
        padding: '120px 6% 80px',
        background: '#000',
        position: 'relative',
      }}>

        {/* neon glow radial */}
        <div style={{
          position: 'absolute', inset: 0, pointerEvents: 'none',
          background: 'radial-gradient(ellipse 80% 60% at 50% 0%, #C8FF0018 0%, transparent 70%)',
          backgroundImage: 'linear-gradient(#C8FF000a 1px, transparent 1px), linear-gradient(90deg, #C8FF000a 1px, transparent 1px)',
          backgroundSize: '60px 60px',
        }} />

        {/* content column */}
        <div style={{
          position: 'relative',
          zIndex: 1,
          maxWidth: 800,
          width: '100%',
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          gap: 0,
        }}>

          {/* ── LOGO stacked ── */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0, marginBottom: 40 }}>
            <img src="ascend-logo.png" alt="Ascend Marketing" style={{ width: 140, height: 140, objectFit: 'cover', objectPosition: 'top', display: 'block', marginBottom: 0 }} />
            <div style={{ textAlign: 'center' }}>
              <div style={{ color: '#ffffff', fontWeight: 900, fontSize: 42, lineHeight: 1, fontFamily: 'Inter, sans-serif' }}>Ascend</div>
              <div style={{ color: '#C8FF00', fontWeight: 700, fontSize: 18, letterSpacing: 3, fontFamily: 'Inter, sans-serif', marginTop: 6 }}>Marketing</div>
            </div>
          </div>

          {/* ── HEADLINE ── */}
          <h1 style={{
            margin: 0,
            marginBottom: 20,
            fontSize: 56,
            fontWeight: 900,
            lineHeight: 1.1,
            letterSpacing: '-0.02em',
            color: '#ffffff',
            fontFamily: 'Inter, sans-serif',
          }}>
            We Help Local Service Businesses<br />
            <span style={{ color: '#C8FF00' }}>
              Get Found, Get Calls &amp; Get Booked — With Video.
            </span>
          </h1>

          {/* ── SUBHEADLINE ── */}
          <p style={{
            margin: 0,
            marginBottom: 40,
            fontSize: 18,
            color: '#999999',
            maxWidth: 620,
            lineHeight: 1.75,
            fontFamily: 'Inter, sans-serif',
          }}>
            Video marketing built specifically for roofers, plumbers, HVAC techs, and home service pros who are done being invisible online.
          </p>

          {/* ── BUTTONS ── */}
          <div style={{ display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap' }}>
            <a
              href="https://calendly.com/ascendmarketingsupport/30min"
              target="_blank"
              rel="noopener noreferrer"
              onClick={(e) => { e.preventDefault(); window.open('https://calendly.com/ascendmarketingsupport/30min', '_blank'); }}
              style={{
                background: '#C8FF00',
                color: '#000',
                fontWeight: 800,
                padding: '16px 32px',
                borderRadius: 10,
                textDecoration: 'none',
                fontSize: 16,
                display: 'inline-flex',
                alignItems: 'center',
                gap: 8,
                boxShadow: '0 0 20px #C8FF0055',
                fontFamily: 'Inter, sans-serif',
              }}>
              Book Your Free Strategy Call
              <Icons.ArrowRight size={18} />
            </a>
            <a href="#how-it-works" style={{
              background: 'transparent',
              color: '#C8FF00',
              fontWeight: 700,
              padding: '16px 32px',
              borderRadius: 10,
              textDecoration: 'none',
              fontSize: 16,
              border: '2px solid #C8FF00',
              fontFamily: 'Inter, sans-serif',
            }}>
              See How It Works
            </a>
          </div>

        </div>
      </section>
    );

    /* ── PROBLEM ── */
    const Problem = () => {
      const cards = [
        {
          icon: <Icons.EyeOff size={28} />,
          title: 'Zero Social Media Presence',
          desc: "You're doing great work but nobody can see it. While you're busy on job sites, your competitors are flooding feeds and stealing your customers.",
        },
        {
          icon: <Icons.TrendingDown size={28} />,
          title: 'Losing Jobs to Competitors',
          desc: 'Prospects Google your name and find nothing. Meanwhile the guy with 50 YouTube videos lands the job — even when he charges more.',
        },
        {
          icon: <Icons.Users size={28} />,
          title: 'Relying Only on Word of Mouth',
          desc: "Referrals are great — until they dry up. You can't scale a business on hoping people talk about you. You need a consistent lead engine.",
        },
      ];
      return (
        <section style={{ padding: '100px 6%', background: '#0a0a0a' }}>
          <div style={{ maxWidth: 1100, margin: '0 auto', textAlign: 'center' }}>
            <div className="fade-in">
              <p style={{ color: '#C8FF00', fontWeight: 700, fontSize: 13, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 12 }}>The Problem</p>
              <h2 style={{ fontSize: 'clamp(1.8rem, 3.5vw, 3rem)', fontWeight: 900, letterSpacing: '-0.03em', marginBottom: 56 }}>
                Your competitors are already on video.<br />
                <span style={{ color: '#999' }}>Are you?</span>
              </h2>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 24 }}>
              {cards.map((c, i) => (
                <div key={i} className="fade-in card-hover" style={{
                  background: '#111', border: '1px solid #222',
                  borderRadius: 12, padding: '36px 28px', textAlign: 'left',
                }}>
                  <div style={{
                    width: 56, height: 56, borderRadius: 12, background: '#C8FF0015',
                    border: '1px solid #C8FF0033', display: 'flex', alignItems: 'center',
                    justifyContent: 'center', color: '#C8FF00', marginBottom: 20,
                  }}>
                    {c.icon}
                  </div>
                  <h3 style={{ fontWeight: 800, fontSize: '1.1rem', marginBottom: 10 }}>{c.title}</h3>
                  <p style={{ color: '#888', lineHeight: 1.7, fontSize: '0.95rem' }}>{c.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    /* ── SERVICES ── */
    const Services = () => {
      const services = [
        {
          icon: <Icons.Video size={28} />,
          title: 'Short Form Video Content',
          desc: 'Scroll-stopping Reels, TikToks, and YouTube Shorts that build trust and generate calls — filmed, edited, and optimized by us.',
        },
        {
          icon: <Icons.Megaphone size={28} />,
          title: 'Video Ad Campaigns',
          desc: 'Facebook, Instagram, and YouTube ads engineered to reach homeowners in your area when they need your service most.',
        },
        {
          icon: <Icons.Globe size={28} />,
          title: 'Google & Social Distribution',
          desc: "We push your content everywhere your customers are — Google, YouTube, Instagram, TikTok — so you're impossible to ignore.",
        },
      ];
      return (
        <section style={{ padding: '100px 6%', background: '#000' }}>
          <div style={{ maxWidth: 1100, margin: '0 auto' }}>
            <div className="fade-in" style={{ textAlign: 'center', marginBottom: 56 }}>
              <p style={{ color: '#C8FF00', fontWeight: 700, fontSize: 13, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 12 }}>Our Services</p>
              <h2 style={{ fontSize: 'clamp(1.8rem, 3.5vw, 3rem)', fontWeight: 900, letterSpacing: '-0.03em' }}>What We Do</h2>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: 24 }}>
              {services.map((s, i) => (
                <div key={i} className="fade-in card-hover" style={{
                  background: '#0d0d0d', border: '1px solid #1a1a1a',
                  borderRadius: 12, padding: '36px 28px',
                }}>
                  <div style={{
                    width: 60, height: 60, borderRadius: 14, background: '#C8FF0015',
                    border: '1px solid #C8FF0044', display: 'flex', alignItems: 'center',
                    justifyContent: 'center', color: '#C8FF00', marginBottom: 24,
                    boxShadow: '0 0 20px #C8FF0022',
                  }}>
                    {s.icon}
                  </div>
                  <h3 style={{ fontWeight: 800, fontSize: '1.2rem', marginBottom: 12 }}>{s.title}</h3>
                  <p style={{ color: '#888', lineHeight: 1.7, fontSize: '0.95rem' }}>{s.desc}</p>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    /* ── HOW IT WORKS ── */
    const HowItWorks = () => {
      const steps = [
        {
          num: '01',
          title: 'Strategy Call',
          desc: 'We learn your business, your goals, your local market, and what makes you different. 30 minutes that changes everything.',
        },
        {
          num: '02',
          title: 'We Create',
          desc: 'We film, script, and edit scroll-stopping videos built to perform. No effort required from you — we handle everything.',
        },
        {
          num: '03',
          title: 'You Convert',
          desc: 'Videos go live across platforms. Leads start coming in. Your phone rings. You book jobs. Simple as that.',
        },
      ];
      return (
        <section id="how-it-works" style={{ padding: '100px 6%', background: '#050505' }}>
          <div style={{ maxWidth: 900, margin: '0 auto', textAlign: 'center' }}>
            <div className="fade-in">
              <p style={{ color: '#C8FF00', fontWeight: 700, fontSize: 13, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 12 }}>The Process</p>
              <h2 style={{ fontSize: 'clamp(1.8rem, 3.5vw, 3rem)', fontWeight: 900, letterSpacing: '-0.03em', marginBottom: 72 }}>
                From Invisible To Fully Booked<br />
                <span style={{ color: '#C8FF00' }}>In 3 Steps</span>
              </h2>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
              {steps.map((step, i) => (
                <div key={i} className="fade-in" style={{ position: 'relative', display: 'flex', alignItems: 'flex-start', gap: 32, textAlign: 'left', marginBottom: i < steps.length - 1 ? 0 : 0 }}>
                  {/* Left: number + line */}
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', flexShrink: 0 }}>
                    <div style={{
                      width: 64, height: 64, borderRadius: '50%', background: '#C8FF00',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      fontWeight: 900, fontSize: '1.3rem', color: '#000',
                      boxShadow: '0 0 30px #C8FF0055', flexShrink: 0,
                    }}>
                      {step.num}
                    </div>
                    {i < steps.length - 1 && (
                      <div style={{ width: 2, height: 80, background: 'linear-gradient(to bottom, #C8FF00, transparent)' }} />
                    )}
                  </div>
                  {/* Right: content */}
                  <div style={{ paddingBottom: i < steps.length - 1 ? 80 : 0, paddingTop: 12 }}>

    /* ── WHO WE HELP ── */

        { icon: <Icons.Zap size={28} />, label: 'Electricians' },
        { icon: <Icons.Car size={28} />, label: 'PDR & Auto' },
        { icon: <Icons.Home size={28} />, label: 'General Contractors' },
        { icon: <Icons.Paintbrush size={28} />, label: 'Painters' },
        { icon: <Icons.Leaf size={28} />, label: 'Landscapers' },
      ];
      return (
        <section style={{ padding: '100px 6%', background: '#000' }}>

              <p style={{ color: '#C8FF00', fontWeight: 700, fontSize: 13, letterSpacing: '0.15em', textTransform: 'uppercase', marginBottom: 12 }}>Who We Serve</p>
              <h2 style={{ fontSize: 'clamp(1.8rem, 3.5vw, 3rem)', fontWeight: 900, letterSpacing: '-0.03em', marginBottom: 56 }}>
                Built For The Trades
              </h2>
            </div>
            <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: 16 }}>
              {industries.map((ind, i) => (
                <div key={i} className="fade-in card-hover" style={{
                  background: '#0d0d0d', border: '1px solid #1a1a1a',
                  borderRadius: 12, padding: '28px 16px', display: 'flex',
                  flexDirection: 'column', alignItems: 'center', gap: 12,

                  <div style={{ color: '#C8FF00' }}>{ind.icon}</div>
                  <span style={{ fontWeight: 700, fontSize: '0.9rem' }}>{ind.label}</span>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    };

    /* ── TESTIMONIALS ── */
    /* ── FINAL CTA ── */
    const FinalCTA = () => (
      <section id="contact" style={{
        padding: '120px 6%', textAlign: 'center',
        background: 'radial-gradient(ellipse 70% 80% at 50% 50%, #C8FF0012 0%, transparent 70%), #000',
        position: 'relative', overflow: 'hidden',
      }}>
        <div style={{
          position: 'absolute', inset: 0, pointerEvents: 'none',
          backgroundImage: 'linear-gradient(#C8FF0008 1px, transparent 1px), linear-gradient(90deg, #C8FF0008 1px, transparent 1px)',
          backgroundSize: '60px 60px',
        }} />
        <div className="fade-in" style={{ position: 'relative', maxWidth: 700, margin: '0 auto' }}>
          <h2 style={{
            fontSize: 'clamp(2.4rem, 5vw, 4rem)', fontWeight: 900,
            letterSpacing: '-0.03em', color: '#C8FF00', marginBottom: 24,
            textShadow: '0 0 60px #C8FF0066',
          }}>

            color: '#888', fontSize: 'clamp(1rem, 2vw, 1.2rem)',

          <a
            href="https://calendly.com/ascendmarketingsupport/30min"
            target="_blank"
            rel="noopener noreferrer"
            onClick={(e) => { e.preventDefault(); window.open('https://calendly.com/ascendmarketingsupport/30min', '_blank'); }}
            className="glow-btn"
            style={{
              background: '#C8FF00', color: '#000', fontWeight: 800,
              padding: '20px 48px', borderRadius: 12, textDecoration: 'none',
              fontSize: '1.1rem', display: 'inline-flex', alignItems: 'center', gap: 10,
            }}>
            Book My Free Call
            <Icons.Phone size={20} />
          </a>
          <p style={{ color: '#555', fontSize: '0.85rem', marginTop: 20 }}>
            No commitment. Takes 30 seconds to book.
          </p>
        </div>
      </section>
    );

    /* ── FOOTER ── */
    const Footer = () => (
      <footer style={{
        background: '#080808', borderTop: '1px solid #C8FF0022',
        padding: '48px 6%', textAlign: 'center',
      }}>
        <div style={{ maxWidth: 1100, margin: '0 auto' }}>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 16 }}>
            <AscendLogo iconSize={40} ascendSize={18} marketingSize={11} />
          </div>
          <p style={{ color: '#666', fontSize: '0.9rem', marginBottom: 8 }}>Video marketing for the trades.</p>
          <p style={{ color: '#444', fontSize: '0.8rem' }}>© 2026 Ascend Marketing. All rights reserved.</p>
        </div>
      </footer>
    );

    /* ── SCROLL ANIMATIONS ── */
    const useScrollAnimation = () => {
      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
            }
          });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, []);
    };

    /* ── MOBILE STICKY CTA ── */
    const MobileStickyBtn = () => (
      <a
        href="https://calendly.com/ascendmarketingsupport/30min"
        target="_blank"
        rel="noopener noreferrer"
        onClick={(e) => { e.preventDefault(); window.open('https://calendly.com/ascendmarketingsupport/30min', '_blank'); }}
        className="mobile-sticky-cta"
        style={{
          position: 'fixed', bottom: 0, left: 0, right: 0,
          background: '#C8FF00', color: '#000',
          fontWeight: 800, fontSize: '1rem',
          textAlign: 'center', textDecoration: 'none',
          padding: '18px 24px',
          boxShadow: '0 -4px 30px #C8FF0055',
          zIndex: 200,
          display: 'none',

      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <style>

    @media (max-width: 640px) {
      .mobile-menu-btn { display: flex !important; }
      .mobile-sticky-cta { display: block !important; }
      /* Add bottom padding so content isn't hidden behind sticky btn */
      body { padding-bottom: 62px; }
    }
  </style>
</body>
</html>
